<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>liwebjs — chat example</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', monospace;
      background: #0d0d0d;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }

    header .logo {
      color: #00ff88;
      font-weight: bold;
      letter-spacing: 2px;
    }

    header .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #888;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #444;
      transition: background 0.3s;
    }

    .dot.connected { background: #00ff88; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 70%;
      padding: 8px 12px;
      border-radius: 2px;
      font-size: 13px;
      line-height: 1.5;
    }

    .msg.mine {
      align-self: flex-end;
      background: #003322;
      border-left: 2px solid #00ff88;
    }

    .msg.theirs {
      align-self: flex-start;
      background: #1a1a1a;
      border-left: 2px solid #333;
    }

    .msg .meta {
      font-size: 11px;
      color: #555;
      margin-bottom: 3px;
    }

    .msg.mine .meta { color: #00aa55; }

    .system-msg {
      align-self: center;
      font-size: 11px;
      color: #444;
      padding: 4px 0;
    }

    footer {
      border-top: 1px solid #222;
      padding: 12px 20px;
      display: flex;
      gap: 10px;
    }

    footer input {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      border-radius: 2px;
    }

    footer input:focus { border-color: #00ff88; }

    footer button {
      background: #00ff88;
      color: #0d0d0d;
      border: none;
      padding: 10px 20px;
      font-family: inherit;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 2px;
      letter-spacing: 1px;
    }

    footer button:hover { background: #00cc66; }
    footer button:disabled { background: #333; color: #666; cursor: not-allowed; }

    #online { color: #00ff88; }
  </style>
</head>
<body>

<header>
  <span class="logo">LIWEBJS</span>
  <span class="status">
    <span class="dot" id="dot"></span>
    <span id="status-text">connecting...</span>
    &nbsp;·&nbsp;
    <span id="online">0</span> online
  </span>
</header>

<div id="messages"></div>

<footer>
  <input
    id="input"
    type="text"
    placeholder="type a message..."
    maxlength="300"
    disabled
  />
  <button id="send-btn" disabled>SEND</button>
</footer>

<script type="module">
  // ── inline liwebjs-client (no bundler needed for example) ──────────────
  function createLiWebClient(url, options = {}) {
    const { reconnect = true, reconnectDelay = 2000 } = options;

    const connectHandlers = [];
    const disconnectHandlers = [];
    const eventHandlers = new Map();

    let ws = null;
    let manualClose = false;

    function connect() {
      ws = new WebSocket(url);

      ws.addEventListener("open", () => {
        for (const h of connectHandlers) h();
      });

      ws.addEventListener("message", (e) => {
        try {
          const parsed = JSON.parse(e.data);
          if (typeof parsed?.event !== "string") return;
          const handlers = eventHandlers.get(parsed.event);
          if (!handlers) return;
          for (const h of handlers) h(parsed.payload ?? null);
        } catch {}
      });

      ws.addEventListener("close", () => {
        for (const h of disconnectHandlers) h();
        if (!manualClose && reconnect) {
          setTimeout(connect, reconnectDelay);
        }
      });
    }

    connect();

    return {
      emit(event, payload) {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        ws.send(JSON.stringify({ event, payload }));
      },
      handle(event, handler) {
        if (!eventHandlers.has(event)) eventHandlers.set(event, []);
        eventHandlers.get(event).push(handler);
      },
      on(event, handler) {
        if (event === "connect") connectHandlers.push(handler);
        if (event === "disconnect") disconnectHandlers.push(handler);
      },
      disconnect() {
        manualClose = true;
        ws?.close();
      },
    };
  }
  // ── end client ──────────────────────────────────────────────────────────

  const username = prompt("Enter your username:") || "anonymous";

  const dot = document.getElementById("dot");
  const statusText = document.getElementById("status-text");
  const onlineEl = document.getElementById("online");
  const messagesEl = document.getElementById("messages");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send-btn");

  let myId = null;

  const client = createLiWebClient(`ws://${location.host}`);

  function addMessage({ username, text, mine }) {
    const div = document.createElement("div");
    div.className = `msg ${mine ? "mine" : "theirs"}`;
    div.innerHTML = `<div class="meta">${username}</div><div>${escapeHtml(text)}</div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addSystem(text) {
    const div = document.createElement("div");
    div.className = "system-msg";
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function setConnected(val) {
    dot.className = `dot ${val ? "connected" : ""}`;
    statusText.textContent = val ? `connected as ${username}` : "reconnecting...";
    input.disabled = !val;
    sendBtn.disabled = !val;
    if (val) input.focus();
  }

  client.on("connect", () => setConnected(true));
  client.on("disconnect", () => setConnected(false));

  client.handle("welcome", (payload) => {
    myId = payload.id;
    onlineEl.textContent = payload.onlineCount;
    addSystem(`you joined as "${username}"`);
  });

  client.handle("message", (payload) => {
    addMessage({
      username: payload.id === myId ? `${payload.username} (you)` : payload.username,
      text: payload.text,
      mine: payload.id === myId,
    });
  });

  client.handle("user:joined", (payload) => {
    onlineEl.textContent = payload.onlineCount;
    addSystem(`someone joined · ${payload.onlineCount} online`);
  });

  client.handle("user:left", (payload) => {
    onlineEl.textContent = payload.onlineCount;
    addSystem(`someone left · ${payload.onlineCount} online`);
  });

  function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    client.emit("message", { username, text });
    input.value = "";
  }

  sendBtn.addEventListener("click", sendMessage);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
  });
</script>

</body>
</html>
